server {
    listen 80;
    server_name _;

    # Serve static search assets directly (bypass proxy)
    location /static/ {
        alias /app/static/;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy everything else to mintlify dev
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Inject search script into HTML responses
        sub_filter '</head>' '<script src="/static/search.js" defer></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;

        # Required for sub_filter to work with gzipped upstream
        proxy_set_header Accept-Encoding "";
    }
}
