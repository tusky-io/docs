apiVersion: apps/v1
kind: Deployment
metadata:
  name: tusky-docs
  labels:
    app: tusky-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tusky-docs
  template:
    metadata:
      labels:
        app: tusky-docs
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: docs
          image: tusky-docs:latest
          ports:
            - containerPort: 3000
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
