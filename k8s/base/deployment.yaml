apiVersion: apps/v1
kind: Deployment
metadata:
  name: tusky-docs
  labels:
    app: tusky-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tusky-docs
  template:
    metadata:
      labels:
        app: tusky-docs
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: docs
          image: tusky-docs:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
