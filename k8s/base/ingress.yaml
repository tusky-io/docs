apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tusky-docs
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - docs.tusky.io
      secretName: tusky-docs-tls
  rules:
    - host: docs.tusky.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tusky-docs
                port:
                  name: http
