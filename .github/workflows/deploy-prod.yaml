name: Deploy to Prod

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tusky-io/docs

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g mintlify@latest

      - run: mintlify broken-links

  build-and-push:
    name: Build & push image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}

  deploy:
    name: Deploy to prod cluster
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          kubectl config use-context prod

      - name: Set image tag
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ghcr.io/tusky-io/docs:prod-${{ github.sha }}

      - name: Deploy
        run: kubectl apply -k k8s/overlays/prod

      - name: Wait for rollout
        run: kubectl rollout status deployment/tusky-docs -n tusky-prod --timeout=120s
